# Test config for inline rules dedup
# Contains inline rules with deliberate duplicates
# 5 rules: 3 unique (2 DOMAIN,inline-dup + 2 DOMAIN-SUFFIX, + MATCH)

[custom]
enable_rule_generator = false
overwrite_original_rules = true

[proxy]
; placeholder - doesn't matter for rule test
http://0.0.0.0:65535/placeholder

[rules]
; Inline rules with duplicates
DOMAIN,inline-dup.com,PROXY
DOMAIN,inline-dup.com,PROXY
DOMAIN-SUFFIX,inline-uniq.net,PROXY
DOMAIN-SUFFIX,inline-uniq.net,PROXY
MATCH,DIRECT

[proxy_group]
PROXY = select
