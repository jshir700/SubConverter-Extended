name: Block PRs to Master
on:
  pull_request_target:
    branches:
      - master
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  block-master-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check Actor
        id: check
        run: |
          # 允许拥有者（你自己）或者特定机器人的 PR 提给 master
          # 这里把你的 GitHub username 填入（假设为 Aethersailor）
          if [[ "${{ github.actor }}" == "jshir700" || "${{ github.actor }}" == "github-actions[bot]" || "${{ github.actor }}" == "dependabot[bot]" ]]; then
            echo "is_allowed=true" >> $GITHUB_OUTPUT
          else
            echo "is_allowed=false" >> $GITHUB_OUTPUT
          fi

      - name: Close PR and Leave Comment
        if: steps.check.outputs.is_allowed == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const message = `
            🚫 **自动拦截提示 (Auto-Block)** 🚫

            感谢你的提交！(Thanks for your contribution!)

            \`master\` 分支仅用于最终发布，不接受外部 PR。
            如有建议或修复，请先提交 Issue 讨论后再由维护者操作。

            这个 PR 已经被自动关闭。感谢你的理解与支持！

            (The \`master\` branch is for releases only and does not accept external PRs.
            Please open an Issue to discuss your contribution first.)
            `;
            
            // 评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
            
            // 关闭 PR
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
