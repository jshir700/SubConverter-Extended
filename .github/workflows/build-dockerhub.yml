name: Build and Push Docker image

on:
  workflow_run:
    workflows: ["CodeQL"]
    types:
      - completed
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'README-*.md'
      - 'docker-compose.yml'
      - '.github/workflows/**'
      - '!.github/workflows/build-dockerhub.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '0 19 * * 0'

permissions:
  contents: write
  packages: write

concurrency:
  group: dockerhub-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: "🔧 Prepare Metadata"
    runs-on: ubuntu-latest
    # Dependabot PRs are auto-merged; workflow_run only proceeds on CodeQL success
    # from push events (excludes PR CodeQL runs); schedule only runs on master.
    if: "github.actor != 'dependabot[bot]' && (github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')) && (github.event_name != 'schedule' || github.ref == 'refs/heads/master')"
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      apk_built: ${{ steps.version.outputs.apk_built }}
      is_tag: ${{ steps.version.outputs.is_tag }}
      tags: ${{ steps.meta.outputs.tags }}
      build_date: ${{ steps.build_date.outputs.build_date }}
      linux_matrix: ${{ steps.linux_matrix.outputs.matrix }}
      docker_changed: ${{ steps.final_docker_changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout exact commit for workflow_run
        if: github.event_name == 'workflow_run'
        run: git checkout ${{ github.event.workflow_run.head_sha }}

      - name: Check for Docker-relevant changes (workflow_run only)
        id: check_docker_changes
        if: github.event_name == 'workflow_run'
        run: |
          # Use diff-tree to correctly handle merge commits (shows all changed files
          # from both parents, not just against the first parent).
          CHANGED_FILES=$(git diff-tree --no-commit-id --diff-filter=ACDMR -r HEAD --name-only 2>/dev/null || echo "")
          echo "Changed files: $CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -qE '^(src/|CMakeLists\.txt|Dockerfile|bridge/|\.github/workflows/build-dockerhub\.yml)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Check if HEAD has a semver tag (tag push via CodeQL gate).
            CURRENT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || echo "")
            if [ -n "$CURRENT_TAG" ]; then
              VERSION="$CURRENT_TAG"
              echo "is_tag=true" >> $GITHUB_OUTPUT
              echo "Detected tag on HEAD: $VERSION"
            else
              # No tag → master push via CodeQL gate.
              echo "is_tag=false" >> $GITHUB_OUTPUT
              LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
              if [ -n "$LATEST_TAG" ]; then
                VERSION="$LATEST_TAG"
                echo "Detected latest tag: $VERSION"
              else
                VERSION="latest"
                echo "No tags found, using 'latest' as version"
              fi
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "CodeQL gate build: $VERSION"
          elif [[ "${{ github.ref }}" == refs/heads/master ]] && ([[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.event_name }}" == "schedule" ]]); then
            echo "is_tag=false" >> $GITHUB_OUTPUT
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LATEST_TAG" ]; then
              VERSION="$LATEST_TAG"
              echo "Detected latest tag: $VERSION"
            else
              VERSION="master-$(git rev-parse --short HEAD)"
              echo "No tags found, using commit hash: $VERSION"
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Master branch build (manual/schedule): $VERSION"
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "Using latest version"
          fi

          # Signal whether APK was built (only semver versions produce APKs).
          if [[ "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "apk_built=true" >> $GITHUB_OUTPUT
          else
            echo "apk_built=false" >> $GITHUB_OUTPUT
          fi

      - name: Finalize Docker-relevant changes
        id: final_docker_changes
        if: github.event_name == 'workflow_run'
        run: |
          # Always build for tag pushes. Otherwise, only build when
          # Docker-relevant files changed.
          if [[ "${{ steps.version.outputs.is_tag }}" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Tag push, forcing Docker build"
          else
            echo "changed=${{ steps.check_docker_changes.outputs.changed }}" >> $GITHUB_OUTPUT
            echo "Docker-relevant changes: ${{ steps.check_docker_changes.outputs.changed }}"
          fi

      - name: Set build date
        id: build_date
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build Linux matrix
        id: linux_matrix
        shell: bash
        run: |
          if [ "${{ steps.version.outputs.is_release }}" = "true" ]; then
            {
              echo 'matrix<<JSON'
              cat <<'JSON'
          {"include":[{"arch":"amd64","runner":"ubuntu-latest","dockerfile":"./Dockerfile","builder_platform":"linux/amd64","image_platform":"linux/amd64","builder_tag":"subconverter-temp:amd64-builder","threads":"16","cache_scope":"subconverter-alpine","extract_mode":"shared","extract_generated":"true","openwrt_arches":"x86_64","qemu_platforms":""},{"arch":"arm64","runner":"ubuntu-24.04-arm","dockerfile":"./Dockerfile","builder_platform":"linux/arm64","image_platform":"linux/arm64","builder_tag":"subconverter-temp:arm64-builder","threads":"4","cache_scope":"subconverter-alpine-arm64","extract_mode":"shared","extract_generated":"false","openwrt_arches":"aarch64_generic,aarch64_cortex-a53,aarch64_cortex-a72","qemu_platforms":""},{"arch":"armv7","runner":"ubuntu-latest","dockerfile":"./docker/Dockerfile.armv7-cross","builder_platform":"linux/amd64","image_platform":"linux/arm/v7","builder_tag":"subconverter-temp:armv7-builder","threads":"2","cache_scope":"subconverter-armv7-cross","extract_mode":"root","extract_generated":"false","openwrt_arches":"arm_cortex-a5_vfpv4,arm_cortex-a7,arm_cortex-a7_vfpv4,arm_cortex-a7_neon-vfpv4,arm_cortex-a8_vfpv3,arm_cortex-a9,arm_cortex-a9_neon,arm_cortex-a9_vfpv3-d16,arm_cortex-a15_neon-vfpv4","qemu_platforms":"arm"}]}
          JSON
              echo 'JSON'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'matrix<<JSON'
              cat <<'JSON'
          {"include":[{"arch":"amd64","runner":"ubuntu-latest","dockerfile":"./Dockerfile","builder_platform":"linux/amd64","image_platform":"linux/amd64","builder_tag":"subconverter-temp:amd64-builder","threads":"16","cache_scope":"subconverter-alpine","extract_mode":"shared","extract_generated":"true","openwrt_arches":"x86_64","qemu_platforms":""}]}
          JSON
              echo 'JSON'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            jshir700/subconverter-extended
          tags: |
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release == 'true' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.is_release == 'true' }}
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' && steps.version.outputs.is_release != 'true' }}

  build-linux:
    name: "🐳 Docker Build (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: prepare
    if: needs.prepare.outputs.docker_changed != 'false'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.linux_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout exact commit for workflow_run
        if: github.event_name == 'workflow_run'
        run: git checkout ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker build args
        id: docker_args
        shell: bash
        env:
          THREADS: ${{ matrix.threads }}
          SHA: ${{ needs.prepare.outputs.sha_short }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
          MIHOMO_REF: Meta
          MIHOMO_CACHE_BUST: ${{ (github.event_name == 'push' || github.event_name == 'workflow_run') && github.ref == 'refs/heads/master' && matrix.extract_generated == 'true' && github.run_id || 'stable' }}
          SOURCE_DEPS_CACHE_BUST: ${{ github.event_name != 'pull_request' && github.run_id || 'stable' }}
          REFRESH_GO_DEPS: ${{ (github.event_name == 'push' || github.event_name == 'workflow_run') && github.ref == 'refs/heads/master' && matrix.extract_generated == 'true' }}
          REFRESH_HEADERS: ${{ (github.event_name == 'push' || github.event_name == 'workflow_run') && github.ref == 'refs/heads/master' && matrix.extract_generated == 'true' }}
        run: |
          {
            echo 'args<<EOF'
            bash scripts/ci/docker-build-args.sh
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build to builder stage
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.builder_tag }}
          target: builder
          platforms: ${{ matrix.builder_platform }}
          build-args: ${{ steps.docker_args.outputs.args }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

      - name: Extract builder output
        shell: bash
        env:
          EXTRACT_GENERATED: ${{ matrix.extract_generated }}
        run: bash scripts/ci/extract-builder-output.sh "${{ matrix.builder_tag }}" "${{ matrix.extract_mode }}"

      - name: Package Release Artifacts (Linux ${{ matrix.arch }})
        if: needs.prepare.outputs.is_release == 'true'
        shell: bash
        run: bash scripts/ci/build-linux-release.sh "${{ needs.prepare.outputs.version }}" "${{ matrix.arch }}" "${{ matrix.openwrt_arches }}"

      - name: Set up QEMU for smoke test
        if: needs.prepare.outputs.is_release == 'true' && matrix.qemu_platforms != ''
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.qemu_platforms }}

      - name: Smoke test artifact (Linux ${{ matrix.arch }})
        if: needs.prepare.outputs.is_release == 'true'
        timeout-minutes: 3
        uses: ./.github/actions/smoke-linux-artifact
        with:
          artifact: SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-${{ matrix.arch }}.tar.gz

      - name: Smoke test APKs (OpenWrt ${{ matrix.arch }})
        if: needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.apk_built == 'true'
        timeout-minutes: 3
        uses: ./.github/actions/smoke-openwrt-apk
        with:
          artifacts: SubConverter-Extended-${{ needs.prepare.outputs.version }}-openwrt-*.apk

      - name: Upload Artifact (Linux ${{ matrix.arch }})
        if: needs.prepare.outputs.is_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: SubConverter-Extended-*.tar.gz

      - name: Upload Artifact (OpenWrt ${{ matrix.arch }})
        if: needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.apk_built == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-${{ matrix.arch }}
          path: SubConverter-Extended-*-openwrt-*.apk

      - name: Clean release packaging files
        if: needs.prepare.outputs.is_release == 'true'
        shell: bash
        run: |
          rm -rf SubConverter-Extended SubConverter-Extended-*.tar.gz
          rm -rf subconverter runtime-libs runtime-root libmihomo.so
          if [[ "${{ needs.prepare.outputs.apk_built }}" == "true" ]]; then
            rm -rf SubConverter-Extended-*.apk build/openwrt-apk
          fi

      - name: Check for file changes
        id: check_changes
        if: matrix.extract_generated == 'true'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain -- bridge/go.mod bridge/go.sum bridge/libmihomo.h src/parser/mihomo_schemes.h src/parser/param_compat.h include/httplib.h include/nlohmann/json.hpp include/inja.hpp include/jpcre2.hpp include/quickjspp.hpp include/libcron include/date include/toml.hpp include/toml11)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push generated files
        if: steps.check_changes.outputs.changed == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          BRANCH_NAME="master"
          echo "Master branch build, pushing generated files to: $BRANCH_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bridge/go.mod bridge/go.sum bridge/libmihomo.h src/parser/mihomo_schemes.h src/parser/param_compat.h include/httplib.h include/nlohmann/json.hpp include/inja.hpp include/jpcre2.hpp include/quickjspp.hpp include/libcron include/date include/toml.hpp include/toml11
          git commit -m "chore: update auto-generated files and header libraries from build [skip ci]"

          git fetch --no-tags origin "refs/heads/$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME"
          git rebase "origin/$BRANCH_NAME"
          git push origin "HEAD:refs/heads/$BRANCH_NAME"

      - name: Report generated file changes outside master
        if: steps.check_changes.outputs.changed == 'true' && github.event_name != 'pull_request' && github.ref != 'refs/heads/master'
        shell: bash
        run: |
          echo "::warning::Generated file changes were detected on ${GITHUB_REF}, but source updates are committed only to master."

      - name: Build and push final image
        id: build_image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ matrix.image_platform }}
          tags: ${{ needs.prepare.outputs.tags }}
          build-args: ${{ steps.docker_args.outputs.args }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

      - name: Save image digest
        if: needs.prepare.outputs.is_release == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p docker-digests
          printf '%s\n' "${{ steps.build_image.outputs.digest }}" > "docker-digests/${{ matrix.arch }}.txt"

      - name: Upload image digest
        if: needs.prepare.outputs.is_release == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch }}
          path: docker-digests/${{ matrix.arch }}.txt

      - name: Smoke test image (${{ matrix.arch }})
        if: github.event_name != 'pull_request' && needs.prepare.outputs.is_release == 'true'
        timeout-minutes: 3
        uses: ./.github/actions/smoke-docker-image
        with:
          image: jshir700/subconverter-extended@${{ steps.build_image.outputs.digest }}
          platform: ${{ matrix.image_platform }}

  build-windows-amd64:
    name: "🪟 Windows Build (amd64)"
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.is_release == 'true' && needs.prepare.outputs.docker_changed != 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout exact commit for workflow_run
        if: github.event_name == 'workflow_run'
        run: git checkout ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: bridge/go.sum

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-yaml-cpp
            mingw-w64-ucrt-x86_64-pcre2
            mingw-w64-ucrt-x86_64-rapidjson

      - name: Build Windows amd64
        shell: msys2 {0}
        run: |
          THREADS=4 bash scripts/build-windows-amd64.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ needs.prepare.outputs.sha_short }}" \
            "${{ needs.prepare.outputs.build_date }}"

      - name: Package Release Artifact (Windows amd64)
        shell: pwsh
        run: ./scripts/package-windows-portable.ps1 -Version "${{ needs.prepare.outputs.version }}"

      - name: Smoke test artifact (Windows amd64)
        timeout-minutes: 3
        uses: ./.github/actions/smoke-windows-artifact
        with:
          artifact: SubConverter-Extended-${{ needs.prepare.outputs.version }}-windows-amd64.zip

      - name: Upload Artifact (Windows amd64)
        uses: actions/upload-artifact@v7
        with:
          name: windows-amd64
          path: SubConverter-Extended-*.zip

  merge-manifest:
    name: "🔗 Docker Manifest"
    runs-on: ubuntu-latest
    needs: [prepare, build-linux]
    if: needs.prepare.outputs.is_release == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          path: digests
          pattern: docker-digest-*
          merge-multiple: true


      - name: Create and push manifest list
        shell: bash
        run: |
          set -euo pipefail

          for arch in amd64 arm64 armv7; do
            test -s "digests/${arch}.txt"
          done

          AMD64_DIGEST="$(cat digests/amd64.txt)"
          ARM64_DIGEST="$(cat digests/arm64.txt)"
          ARMV7_DIGEST="$(cat digests/armv7.txt)"
          TAGS="${{ needs.prepare.outputs.tags }}"
          IMAGE_NAMES=(
            "jshir700/subconverter-extended"
          )

          for IMAGE_NAME in "${IMAGE_NAMES[@]}"; do
            for TAG in $TAGS; do
              if [[ "$TAG" == "$IMAGE_NAME:"* ]]; then
                docker buildx imagetools create \
                  -t "$TAG" \
                  "${IMAGE_NAME}@${AMD64_DIGEST}" \
                  "${IMAGE_NAME}@${ARM64_DIGEST}" \
                  "${IMAGE_NAME}@${ARMV7_DIGEST}"
              fi
            done
          done

      - name: Verify manifest platforms
        shell: bash
        run: |
          set -euo pipefail

          TAGS="${{ needs.prepare.outputs.tags }}"
          for TAG in $TAGS; do
            if [[ "$TAG" != ghcr.io/* ]]; then
              echo "Skipping Docker Hub platform inspection for $TAG to avoid pull rate limits."
              echo "The manifest push step above already covered Docker Hub publication."
              continue
            fi

            echo "Inspecting $TAG"
            for attempt in $(seq 1 6); do
              if docker buildx imagetools inspect "$TAG" > manifest.txt; then
                break
              fi
              if [ "$attempt" -eq 6 ]; then
                echo "Failed to inspect $TAG"
                exit 1
              fi
              sleep 5
            done

            cat manifest.txt
            for PLATFORM in "linux/amd64" "linux/arm64" "linux/arm/v7"; do
              if ! grep -Eq "Platform:[[:space:]]+${PLATFORM}$" manifest.txt; then
                echo "Missing platform ${PLATFORM} in ${TAG}"
                exit 1
              fi
            done
          done

  create-release:
    name: "🚀 Release Artifacts"
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-windows-amd64, merge-manifest]
    if: needs.prepare.outputs.is_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Release Notes Context
        run: |
          set -euo pipefail

          git fetch --tags --force origin

          CURRENT_TAG="${{ needs.prepare.outputs.version }}"
          CURRENT_COMMIT="$(git rev-list -n 1 "$CURRENT_TAG")"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' "${CURRENT_COMMIT}^" 2>/dev/null || true)"
          EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE_LABEL="$PREVIOUS_TAG..$CURRENT_TAG"
            git log --pretty=format:'- %h %s' "$PREVIOUS_TAG..$CURRENT_TAG" > commits.md
            git diff --name-only "$PREVIOUS_TAG" "$CURRENT_TAG" > changed-files.md
            git diff --stat "$PREVIOUS_TAG" "$CURRENT_TAG" > diffstat.md
          else
            RANGE_LABEL="$CURRENT_TAG"
            git log --pretty=format:'- %h %s' "$CURRENT_TAG" > commits.md
            git diff --name-only "$EMPTY_TREE" "$CURRENT_TAG^{tree}" > changed-files.md
            git diff --stat "$EMPTY_TREE" "$CURRENT_TAG^{tree}" > diffstat.md
          fi

          {
            echo "# Release Context"
            echo
            echo "Current tag: $CURRENT_TAG"
            echo "Previous tag: ${PREVIOUS_TAG:-none}"
            echo "Range: $RANGE_LABEL"
            echo
            echo "## Commits"
            cat commits.md
            echo
            echo
            echo "## Changed files"
            sed 's/^/- /' changed-files.md
            echo
            echo
            echo "## Diff stat"
            cat diffstat.md
          } > release-context.md

          {
            echo "## English"
            echo
            echo "### Changes"
            if [ -s commits.md ]; then
              cat commits.md
            else
              echo "- No commit summary was available."
            fi
            echo
            echo "## 中文"
            echo
            echo "### 变更"
            echo "本次发布包含以下提交："
            if [ -s commits.md ]; then
              cat commits.md
            else
              echo "- 未获取到提交摘要。"
            fi
          } > release-notes.fallback.md

      - name: Check Copilot Token
        id: copilot_token
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          if [ -n "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.copilot_token.outputs.available == 'true'
        uses: actions/setup-node@v6

      - name: Generate Bilingual Release Notes with Copilot
        if: steps.copilot_token.outputs.available == 'true'
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          npm install -g @github/copilot

          PROMPT="$(cat <<'EOF'
          You are writing release notes for SubConverter-Extended.

          Use only the release context provided below. Do not invent features, fixes, platforms, or compatibility claims.
          Summarize user-visible changes first. Mention maintenance or dependency changes only when relevant.
          Ignore auto-generated files unless the context shows they affect users.

          Return only Markdown. Do not wrap the answer in a code fence.
          Do not include a downloads section; it will be appended by the workflow.

          Required format:

          ## English

          ### Highlights
          - ...

          ### Changes
          - ...

          ## 中文

          ### 亮点
          - ...

          ### 变更
          - ...

          Omit empty sections. Keep each language concise and accurate.
          EOF
          )"

          PROMPT="$PROMPT

          $(cat release-context.md)"

          copilot -p "$PROMPT" --no-ask-user > release-notes.ai.md
          grep -q '[[:alnum:]]' release-notes.ai.md

      - name: Assemble Release Notes
        run: |
          set -euo pipefail

          if [ -s release-notes.ai.md ]; then
            cp release-notes.ai.md release-notes.md
            echo "Using Copilot-generated release notes."
          else
            cp release-notes.fallback.md release-notes.md
            echo "Using fallback release notes."
          fi

          cat >> release-notes.md <<'EOF'

          ---

          <div align="center">

          ![Version](https://img.shields.io/badge/version-${{ needs.prepare.outputs.version }}-blue?style=for-the-badge&logo=github)
          ![Docker](https://img.shields.io/badge/docker-jshir700%2Fsubconverter--extended-2496ED?style=for-the-badge&logo=docker)
          ![License](https://img.shields.io/badge/license-GPL--3.0-orange?style=for-the-badge)
          ![Platform](https://img.shields.io/badge/platform-amd64%20|%20arm64%20|%20armv7-lightgrey?style=for-the-badge)

          </div>

          ---

          ## 🐳 Docker Images / Docker 镜像

          | Platform / 平台 | Arch | Image / 镜像 |
          |:---|:---|:---|
          | `linux/amd64` | x86_64 | `jshir700/subconverter-extended:${{ needs.prepare.outputs.version }}` |
          | `linux/arm64` | aarch64 | `jshir700/subconverter-extended:${{ needs.prepare.outputs.version }}` |
          | `linux/arm/v7` | armv7 | `jshir700/subconverter-extended:${{ needs.prepare.outputs.version }}` |

          > 🏷️ `latest` tag is also updated to this release / `latest` 标签同步更新至本版本

          ## 📥 Downloads / 下载

          ### 🐧 Linux (portable, glibc runtime bundled) / Linux 便携版

          | Arch | File / 文件 |
          |:---|:---|
          | **amd64** | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-amd64.tar.gz` |
          | **arm64** | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-arm64.tar.gz` |
          | **armv7** | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-linux-armv7.tar.gz` |

          ### 🪟 Windows (portable) / Windows 便携版

          | Arch | File / 文件 |
          |:---|:---|
          | **amd64** | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-windows-amd64.zip` |

          ### 🌐 OpenWrt 25.12+ APK (unsigned) / OpenWrt 25.12+ APK（未签名）

          > 📦 Install / 安装: `apk add --allow-untrusted ./<package>.apk`
          > ⚙️ Config / 配置: `/etc/subconverter/pref.toml` (created on first start, preserved across upgrades / 首次启动创建，升级保留)

          | Arch / 架构 | OpenWrt Target | File / 文件 |
          |:---|:---|:---|
          | **x86_64** | `x86_64` | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-openwrt-x86_64.apk` |
          | **aarch64** | `aarch64_generic` | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-openwrt-aarch64_generic.apk` |
          | **aarch64** | `aarch64_cortex-a53` | `...-aarch64_cortex-a53.apk` |
          | **aarch64** | `aarch64_cortex-a72` | `...-aarch64_cortex-a72.apk` |
          | **armv7** | `arm_cortex-a5_vfpv4` | `SubConverter-Extended-${{ needs.prepare.outputs.version }}-openwrt-arm_cortex-a5_vfpv4.apk` |
          | **armv7** | `arm_cortex-a7 / a8 / a9 / a15` | `...-arm_cortex-a*.apk` |

          ### 🔐 Checksums / 校验和

          | File / 文件 | SHA256 |
          |:---|:---|
          | `SHA256SUMS` | See attached / 见附件 |

          EOF

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: false

      - name: Generate checksums
        run: |
          set -euo pipefail

          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.apk' \) -print | sort | while read -r file; do
            sha256sum "$file" | sed 's#  artifacts/[^/]*/#  #'
          done > SHA256SUMS

          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: |
            artifacts/linux-*/*.tar.gz
            artifacts/openwrt-*/*.apk
            artifacts/windows-*/*.zip
            SHA256SUMS
          body_path: release-notes.md
